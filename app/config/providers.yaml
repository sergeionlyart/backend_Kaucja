version: 1
updated_at: "2026-03-07"

defaults:
  llm_provider: openai
  llm_model: gpt-5.1
  prompt_name: kaucja_gap_analysis
  prompt_version: v001
  ocr_provider: mistral
  ocr_model: mistral-ocr-latest

llm_providers:
  openai:
    api_key_env: OPENAI_API_KEY
    api_mode: responses
    ui:
      reasoning_effort_values: [auto, low, medium, high]
    models:
      gpt-5.1:
        id: gpt-5.1
        structured_output_json_schema: true
      gpt-5.2:
        id: gpt-5.2
        structured_output_json_schema: true
      gpt-5.4:
        id: gpt-5.4
        structured_output_json_schema: true

  google:
    api_key_env: GOOGLE_API_KEY
    api_mode: google_genai
    default_model: gemini-2.5-flash
    ui:
      thinking_level_values: [auto, low, medium, high]
    models:
      gemini-2.5-flash:
        id: gemini-2.5-flash
        structured_output_json_schema: true
        supports_thinking: false
      gemini-2.5-pro:
        id: gemini-2.5-pro
        structured_output_json_schema: true
        supports_thinking: false

ocr_providers:
  mistral:
    api_key_env: MISTRAL_API_KEY
    models:
      mistral-ocr-latest:
        id: mistral-ocr-latest
