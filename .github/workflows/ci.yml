name: Legal Ingest CI

on:
  pull_request:
    paths:
      - '2026-03-01__legaldocs_ingest__foundation/**'
      - '.github/workflows/**'
  push:
    branches: [exp/iter1-lex-saos-fixes]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: 2026-03-01__legaldocs_ingest__foundation

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Lint
        run: ruff check .

      - name: Unit and integration tests
        run: pytest -q

  smoke-mode-a:
    runs-on: ubuntu-latest
    needs: lint-test
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Ensure indexes
        run: python -m legal_ingest.cli ensure-indexes --config configs/config.ci.mode_a.yml

      - name: Smoke ingest Mode A
        run: |
          python -m legal_ingest.cli ingest \
            --config configs/config.ci.mode_a.yml \
            --run-id ci_smoke_a \
            --artifact-dir ./artifacts_ci

      - name: Assert Mode A metrics
        run: |
          python3 -c "
          import json, sys
          with open('artifacts_ci/runs/ci_smoke_a/run_report.json') as f:
              rr = json.load(f)
          s = rr['stats']
          tm = s.get('transport_metrics', {})
          assert s['docs_ok'] >= 3, f'expected >=3 OK, got {s[\"docs_ok\"]}'
          print(f'Mode A: ok={s[\"docs_ok\"]} err={s[\"docs_error\"]}')
          print(f'transport: direct={tm.get(\"direct_attempts\",0)} browser={tm.get(\"browser_attempts\",0)} browser_ok={tm.get(\"browser_success\",0)}')
          print('Mode A smoke: ASSERTIONS PASS')
          "

      - name: Upload smoke-mode-a artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-mode-a-artifacts
          path: |
            2026-03-01__legaldocs_ingest__foundation/artifacts_ci/runs/ci_smoke_a/run_report.json
            2026-03-01__legaldocs_ingest__foundation/artifacts_ci/runs/ci_smoke_a/logs.jsonl
            2026-03-01__legaldocs_ingest__foundation/artifacts_ci/runs/ci_smoke_a/fetch_attempts.jsonl
          retention-days: 30

  smoke-mode-b:
    runs-on: ubuntu-latest
    needs: lint-test
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure indexes
        run: python -m legal_ingest.cli ensure-indexes --config configs/config.ci.mode_b.yml

      - name: Smoke ingest Mode B
        run: |
          python -m legal_ingest.cli ingest \
            --config configs/config.ci.mode_b.yml \
            --run-id ci_smoke_b \
            --artifact-dir ./artifacts_ci

      - name: Assert Mode B degradation
        run: |
          python3 -c "
          import json, sys
          with open('artifacts_ci/runs/ci_smoke_b/run_report.json') as f:
              rr = json.load(f)
          s = rr['stats']
          tm = s.get('transport_metrics', {})
          assert tm.get('browser_attempts', 0) == 0, f'browser_attempts={tm.get(\"browser_attempts\")}'
          assert s['docs_ok'] >= 2, f'expected >=2 OK docs, got {s[\"docs_ok\"]}'
          assert s['docs_error'] >= 1, f'expected >=1 error (EUR-Lex WAF), got {s[\"docs_error\"]}'
          print(f'Mode B: ok={s[\"docs_ok\"]} err={s[\"docs_error\"]}')
          print(f'transport: browser_attempts={tm.get(\"browser_attempts\",0)} (expected 0)')
          print('Mode B smoke: ASSERTIONS PASS (graceful degradation confirmed)')
          "

      - name: Upload smoke-mode-b artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-mode-b-artifacts
          path: |
            2026-03-01__legaldocs_ingest__foundation/artifacts_ci/runs/ci_smoke_b/run_report.json
            2026-03-01__legaldocs_ingest__foundation/artifacts_ci/runs/ci_smoke_b/logs.jsonl
            2026-03-01__legaldocs_ingest__foundation/artifacts_ci/runs/ci_smoke_b/fetch_attempts.jsonl
          retention-days: 30

  full-ingest:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: lint-test
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_DB: ${{ secrets.MONGO_DB }}
    steps:
      - name: Check secrets
        id: check
        run: |
          if [ -z "$MONGO_URI" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::MONGO_URI not set — skipping full ingest"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: .

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: steps.check.outputs.skip != 'true'
        run: python -m playwright install chromium

      - name: Full ingest (all 38 sources)
        if: steps.check.outputs.skip != 'true'
        run: |
          python -m legal_ingest.cli ingest \
            --config configs/config.caslaw_v22.full.yml \
            --run-id ci_full_ingest \
            --artifact-dir ./artifacts_ci
