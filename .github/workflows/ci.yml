name: Legal Ingest CI

on:
  pull_request:
    paths:
      - '2026-03-01__legaldocs_ingest__foundation/**'
      - '.github/workflows/**'
  push:
    branches: [exp/iter1-lex-saos-fixes]
  workflow_dispatch:

defaults:
  run:
    working-directory: 2026-03-01__legaldocs_ingest__foundation

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Lint
        run: ruff check .

      - name: Unit and integration tests
        run: pytest -q

  smoke-mode-a:
    runs-on: ubuntu-latest
    needs: lint-test
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_DB: ${{ secrets.MONGO_DB }}
    steps:
      - name: Check secrets availability
        id: check
        run: |
          if [ -z "$MONGO_URI" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "MONGO_URI not set — skipping smoke jobs"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: .

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: steps.check.outputs.skip != 'true'
        run: python -m playwright install chromium

      - name: Validate config
        if: steps.check.outputs.skip != 'true'
        run: python -m legal_ingest.cli validate-config --config configs/config.caslaw_v22.full.yml

      - name: Doctor preflight
        if: steps.check.outputs.skip != 'true'
        run: python -m legal_ingest.cli doctor --config configs/config.caslaw_v22.full.yml

      - name: Smoke ingest Mode A
        if: steps.check.outputs.skip != 'true'
        run: |
          python -m legal_ingest.cli ingest \
            --config configs/config.caslaw_v22.full.yml \
            --run-id ci_smoke_a \
            --artifact-dir ./artifacts_ci

      - name: Assert Mode A metrics
        if: steps.check.outputs.skip != 'true'
        run: |
          python3 -c "
          import json, sys
          with open('artifacts_ci/runs/ci_smoke_a/run_report.json') as f:
              rr = json.load(f)
          s = rr['stats']
          assert s['docs_error'] == 0, f'errors={s[\"docs_error\"]}'
          assert s['docs_ok'] > 0, 'no OK docs'
          tm = s.get('transport_metrics', {})
          print(f'Mode A: ok={s[\"docs_ok\"]} err={s[\"docs_error\"]} browser={tm.get(\"browser_attempts\",0)}')
          "

  smoke-mode-b:
    runs-on: ubuntu-latest
    needs: lint-test
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_DB: ${{ secrets.MONGO_DB }}
    steps:
      - name: Check secrets availability
        id: check
        run: |
          if [ -z "$MONGO_URI" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "MONGO_URI not set — skipping smoke jobs"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: .

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Validate Mode B config
        if: steps.check.outputs.skip != 'true'
        run: python -m legal_ingest.cli validate-config --config configs/config.caslaw_v22.mode_b.yml

      - name: Smoke ingest Mode B
        if: steps.check.outputs.skip != 'true'
        run: |
          python -m legal_ingest.cli ingest \
            --config configs/config.caslaw_v22.mode_b.yml \
            --run-id ci_smoke_b \
            --artifact-dir ./artifacts_ci

      - name: Assert Mode B degradation
        if: steps.check.outputs.skip != 'true'
        run: |
          python3 -c "
          import json, sys
          with open('artifacts_ci/runs/ci_smoke_b/run_report.json') as f:
              rr = json.load(f)
          s = rr['stats']
          tm = s.get('transport_metrics', {})
          assert tm.get('browser_attempts', 0) == 0, 'browser was attempted'
          print(f'Mode B: ok={s[\"docs_ok\"]} err={s[\"docs_error\"]} browser={tm.get(\"browser_attempts\",0)}')
          "
