input:
  root_path: "../docs/legal/cas_law_v2_2_md"
  glob: "**/*.md"
  ignore_hidden: true
  max_file_size_bytes: 67108864

mongo:
  uri: "mongodb://localhost:27017"
  database: "kaucja_legal_corpus"
  collection: "documents_cas_law_v2_2_prod_v3"

model:
  provider: "openai"
  api: "responses"
  model_id: "gpt-5.4"
  reasoning_effort: "xhigh"
  translation_reasoning_effort: "auto"
  text_verbosity: "low"
  truncation: "disabled"
  store: false
  analysis_max_output_tokens: 32000
  translation_ru_max_output_tokens: 128000
  request_timeout_seconds: 600

prompts:
  prompt_pack_id: "kaucja-prompt-pack"
  prompt_pack_version: "2026-03-20"
  prompt_dir: "../prompts/kaucja"

pipeline:
  schema_version: "2.0.0"
  pipeline_version: "2.0.0"
  workers: 1
  dedup_version: "2.0.0"
  router_version: "2.0.0"
  history_tail_size: 10
  retry_model_calls: 2
  retry_mongo_writes: 2
  llm_dispatch_mode: "direct"
  batch_max_requests: 25
  batch_max_input_file_bytes: 8388608
  batch_poll_interval_seconds: 30
  batch_inflight_jobs_limit: 2
  batch_min_requests_to_submit: 5
  batch_apply_direct_fallback: true
  batch_jobs_collection: "analysis_batch_jobs_v2"
  batch_items_collection: "analysis_batch_items_v2"
  batch_discount_factor: 0.5
