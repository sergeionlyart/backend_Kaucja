name: Legal Ingest CI
on:
  pull_request:
    paths:
      - '2026-03-01__legaldocs_ingest__foundation/**'
  push:
    branches: [exp/iter1-lex-saos-fixes]

defaults:
  run:
    working-directory: 2026-03-01__legaldocs_ingest__foundation

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Lint
        run: ruff check .

      - name: Unit & integration tests
        run: pytest -q

  smoke-mode-a:
    runs-on: ubuntu-latest
    needs: lint-test
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_DB: ${{ secrets.MONGO_DB }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Validate config
        run: python -m legal_ingest.cli validate-config --config configs/config.caslaw_v22.full.yml

      - name: Doctor preflight
        run: python -m legal_ingest.cli doctor --config configs/config.caslaw_v22.full.yml

      - name: Smoke ingest (Mode A, limit 5)
        run: |
          python -m legal_ingest.cli ingest \
            --config configs/config.caslaw_v22.full.yml \
            --run-id ci_smoke_a \
            --artifact-dir ./artifacts_ci

      - name: Assert Mode A metrics
        run: |
          python -c "
          import json
          with open('artifacts_ci/runs/ci_smoke_a/run_report.json') as f:
              rr = json.load(f)
          s = rr['stats']
          assert s['docs_error'] == 0, f'Expected 0 errors, got {s[\"docs_error\"]}'
          assert s['docs_ok'] > 0, 'Expected at least 1 OK doc'
          print(f'Mode A smoke: docs_ok={s[\"docs_ok\"]}, docs_error={s[\"docs_error\"]}')
          tm = s.get('transport_metrics', {})
          print(f'transport: direct={tm.get(\"direct_attempts\",0)} browser={tm.get(\"browser_attempts\",0)}')
          "

  smoke-mode-b:
    runs-on: ubuntu-latest
    needs: lint-test
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      MONGO_DB: ${{ secrets.MONGO_DB }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Mode B config
        run: python -m legal_ingest.cli validate-config --config configs/config.caslaw_v22.mode_b.yml

      - name: Smoke ingest (Mode B, browser disabled)
        run: |
          python -m legal_ingest.cli ingest \
            --config configs/config.caslaw_v22.mode_b.yml \
            --run-id ci_smoke_b \
            --artifact-dir ./artifacts_ci

      - name: Assert Mode B graceful degradation
        run: |
          python -c "
          import json
          with open('artifacts_ci/runs/ci_smoke_b/run_report.json') as f:
              rr = json.load(f)
          s = rr['stats']
          tm = s.get('transport_metrics', {})
          assert tm.get('browser_attempts', 0) == 0, f'Expected 0 browser attempts, got {tm.get(\"browser_attempts\")}'
          print(f'Mode B smoke: docs_ok={s[\"docs_ok\"]}, docs_error={s[\"docs_error\"]}')
          print(f'transport: browser_attempts={tm.get(\"browser_attempts\",0)} (expected 0)')
          print('Mode B: pipeline completed without crash ✅')
          "
