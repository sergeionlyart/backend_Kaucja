run:
  run_id: "iter4_caslaw_v22_full_recovery"
  dry_run: false
  artifact_dir: "./artifacts_iter4"
  concurrency: 4
  http:
    user_agent: "LegalRAG-Ingest/0.1"
    timeout_seconds: 120
    max_retries: 6
    retry_backoff_seconds: 2.0

mongo:
  uri: "${MONGO_URI}"
  db: "${MONGO_DB}"
  write_concern: "majority"

parsers:
  pdf:
    engine: "pymupdf"
    min_avg_chars_per_page: 200
    max_empty_page_ratio: 0.30
  html:
    engine: "bs4"
    max_tokens_per_virtual_page: 1200
    min_heading_to_split: 2

ocr:
  enabled: false
  api_key_env: "MISTRAL_API_KEY"

